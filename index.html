/*  存储                                                                */
/* ------------------------------------------------------------------ */
const STORE_KEY = "drills-zh-ds-v1";

function safeGet(key) {
  try { return window.localStorage.getItem(key); } catch { return null; }
}
function safeSet(key, val) {
  try { window.localStorage.setItem(key, val); return true; } catch { return false; }
}

async function loadStore() {
  try {
    const r = safeGet(STORE_KEY);
    return r ? JSON.parse(r) : { records: {}, gen: {} };
  } catch {
    return { records: {}, gen: {} };
  }
}

async function saveStore(store) {
  safeSet(STORE_KEY, JSON.stringify(store));
}

/* ---- DeepSeek API key(仅保存在你自己的浏览器里) ---- */
const KEY_STORAGE = "drills-ds-apikey";
function getApiKey() { return safeGet(KEY_STORAGE) || ""; }
function setApiKey(k) { safeSet(KEY_STORAGE, (k || "").trim()); }

/* ------------------------------------------------------------------ */
/*  API 调用                                                            */
/* ------------------------------------------------------------------ */
function extractJson(text) {
  const start = text.indexOf("{");
  const end = text.lastIndexOf("}");
  if (start === -1 || end === -1) throw new Error("模型输出中没有找到 JSON");
  return JSON.parse(text.slice(start, end + 1));
}

async function callLLMOnce(prompt) {
  const key = getApiKey();
  if (!key) throw new Error("还没有设置 API Key");
  const response = await fetch("https://api.deepseek.com/chat/completions", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${key}`,
    },
    body: JSON.stringify({
      model: "deepseek-chat",
      max_tokens: 1200,
      temperature: 0.4,
      messages: [{ role: "user", content: prompt }],
    }),
  });
  if (response.status === 401) throw new Error("API Key 无效或已过期(401)");
  if (response.status === 402) throw new Error("DeepSeek 账户余额不足(402)");
  if (response.status === 429) throw new Error("请求太频繁,稍等几秒再试(429)");
  const data = await response.json();
  if (data.error) throw new Error(data.error.message || "API 错误");
  const text = data.choices?.[0]?.message?.content;
  if (!text) throw new Error("API 返回为空");
  return extractJson(text);
}

async function callClaude(prompt) {
  try {
    return await callLLMOnce(prompt);
  } catch (e) {
    if (/401|402|Key/.test(e.message)) throw e; // 配置类错误不重试
    await new Promise((res) => setTimeout(res, 800));
    return await callLLMOnce(prompt);
  }
}

【学员的回答】
${answer}

只返回 JSON(不要任何其他文字、不要 markdown 代码块):
{
  "band": "档位,取值只能是: needs_work | solid | strong | excellent",
  "verdict": "一句话总评,具体、成长导向",
  "dimensions": [
    {"name": "维度名(从考点提炼3个,尽量短)", "score": 0到5的整数, "comment": "一句点评,20字以内"}
  ],
  "highlights": ["做得好的点,1-2条,引用学员的原话片段"],
  "issues": ["改进点,1-2条,各指向一个具体的句子,35字以内"],
  "better": "基于学员的回答改写的更好版本,保留其中好的部分——长度与真实消息相当,不要更长",
  "tip": "一条可迁移的原则,一句话"
}
档位校准:needs_work = 敷衍或偏离考点;solid = 扎实但有明确升级空间;strong = 结构和措辞都到位;excellent = 极少给,几乎无可挑剔。维度打分要敢于拉开差距:好就是5,一般就是3,缺失就是1。`);

  // Deterministic score: band sets the range, dimension average sets the position within it.
  const BANDS = { needs_work: [35, 59], solid: [60, 75], strong: [76, 88], excellent: [89, 97] };
  const [lo, hi] = BANDS[raw.band] || BANDS.solid;
  const dims = Array.isArray(raw.dimensions) ? raw.dimensions : [];
  const avg = dims.length ? dims.reduce((a, d) => a + Math.max(0, Math.min(5, d.score || 0)), 0) / (dims.length * 5) : 0.5;
  const score = Math.round(lo + (hi - lo) * avg);
  return { ...raw, score };
}

async function generateQuestions(catKey, existingTitles) {
  const cat = CATEGORIES[catKey];
  const out = await callClaude(`你为咨询顾问和企业职场人设计沟通练习题。为分类「${cat.name}」(主题:${cat.desc})生成 3 道新题。

规则:
- 场景真实、具体(咨询/企业环境);学员必须写下他们真实会说或会发的话。
- 一道简单、一道中等、一道困难。
- 不得与以下已有题目重复:${existingTitles.join("; ")}
- 每个场景以明确的写作指令结尾,如\u201c写下这条消息。\u201d或\u201c写下你会说的话。\u201d

只返回 JSON(不要任何其他文字、不要 markdown 代码块):
{
  "questions": [
    { "title": "短标题,4-8字", "level": "简单|中等|困难", "scenario": "情境,2-4句,以写作指令结尾", "keyPoints": "考点:3-4条具体的评分标准,分号分隔" }
  ]
}`);
  return (out.questions || []).slice(0, 3).map((x, i) => ({
    ...x,
    id: `g-${catKey}-${Date.now()}-${i}`,
    cat: catKey,
    kp: [],
    level: ["简单", "中等", "困难"].includes(x.level) ? x.level : "中等",
  }));
}

function App() {
  const [view, setView] = useState("list");
  const [activeId, setActiveId] = useState(null);
  const [answer, setAnswer] = useState("");
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState(null);
  const [store, setStore] = useState({ records: {}, gen: {} });
  const [storeReady, setStoreReady] = useState(false);
  const [genLoading, setGenLoading] = useState(null);
  const [genError, setGenError] = useState(null);
  const [hasKey, setHasKey] = useState(!!getApiKey());

  useEffect(() => {
    loadStore().then((s) => { setStore(s); setStoreReady(true); });
  }, []);

  useEffect(() => {
    if (typeof window !== "undefined") window.scrollTo(0, 0);
  }, [view, result]);

  const allQuestions = useMemo(() => {
    const gen = Object.values(store.gen || {}).flat();
    return [...BUILTIN, ...gen];
  }, [store.gen]);

  const q = allQuestions.find((x) => x.id === activeId);

  const stats = useMemo(() => {
    const scores = Object.values(store.records || {}).map((r) => r.best);
    return {
      done: scores.length,
      avg: scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : null,
    };
  }, [store.records]);

  const persist = (next) => { setStore(next); saveStore(next); };

  const getAttempts = (id) => {
    const rec = (store.records || {})[id];
    if (!rec) return [];
    if (rec.attempts) return rec.attempts;
    if (rec.lastResult) return [{ answer: rec.lastAnswer, result: rec.lastResult, ts: rec.ts }];
    return [];
  };

  const openQuestion = (id) => {
    const attempts = getAttempts(id);
    const last = attempts[attempts.length - 1];
    setActiveId(id);
    setAnswer(last?.answer || "");
    setResult(null);
    setError(null);
    setView("question");
  };

  const submit = async () => {
    if (!answer.trim() || loading) return;
    setLoading(true);
    setError(null);
    try {
      const r = await gradeAnswer(q, answer);
      setResult(r);
      const prev = (store.records || {})[q.id] || {};
      const history = prev.attempts
        ? [...prev.attempts]
        : prev.lastResult
          ? [{ answer: prev.lastAnswer, result: prev.lastResult, ts: prev.ts }]
          : [];
      history.push({ answer, result: r, ts: Date.now() });
      const attempts = history.slice(-30);
      persist({
        ...store,
        records: { ...store.records, [q.id]: { best: Math.max(prev.best || 0, r.score), attempts } },
      });
    } catch (e) {
      setError(`批改失败:${e.message || "未知错误"}。请再试一次。`);
    } finally {
      setLoading(false);
    }
  };

  const refreshCategory = async (catKey) => {
    if (genLoading) return;
    setGenLoading(catKey);
    setGenError(null);
    try {
      const existing = allQuestions.filter((x) => x.cat === catKey).map((x) => x.title);
      const fresh = await generateQuestions(catKey, existing);
      if (!fresh.length) throw new Error("empty");
      persist({ ...store, gen: { ...store.gen, [catKey]: fresh } });
    } catch (e) {
      setGenError(catKey);
    } finally {
      setGenLoading(null);
    }
  };

  if (!hasKey) {
    return <ApiKeyPanel onDone={() => setHasKey(true)} />;
  }

  /* ---------------- 知识点 ---------------- */
  if (view === "notes") {
    return <StudyNotes questions={allQuestions} onBack={() => setView("list")} onOpenQuestion={openQuestion} />;
  }

  /* ---------------- 设计预览 ---------------- */

        </button>

        <ExamCard className="rise">
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
            <span style={{ ...display, fontSize: 13, color: FAINT }}>{CATEGORIES[q.cat].num}</span>
            <span style={{ fontSize: 11.5, color: lv.color, background: lv.bg, padding: "3px 8px", borderRadius: 999, ...body }}>
              {q.level}
            </span>
            {rec && (
              <span style={{ ...hand, fontSize: 19, color: RED, transform: "rotate(-2deg)" }}>最高 {rec.best}</span>
            )}
          </div>
          <h1 style={{ ...display, fontSize: 21, fontWeight: 700, margin: "0 0 12px", lineHeight: 1.4 }}>{q.title}</h1>
          <p style={{ fontSize: 14.5, lineHeight: 1.85, whiteSpace: "pre-wrap", margin: 0, color: "#39434F" }}>{q.scenario}</p>
          {linkedKp.length > 0 && (
            <p style={{ fontSize: 11.5, color: FAINT, margin: "12px 0 0", ...body }}>
              考察:{linkedKp.map((k) => k.name).join(" · ")}
            </p>
          )}
        </ExamCard>

        {!result && (
          <div style={{ marginTop: 14 }}>
            <textarea
              value={answer}
              onChange={(e) => setAnswer(e.target.value)}
              placeholder="写下你真实会说的话——不是标准答案,是你会发出去的那条消息。"
              rows={7}
              style={{
                width: "100%", boxSizing: "border-box",
                background: CARD, border: `1px solid ${RULE}`,
                padding: "14px", fontSize: 16, lineHeight: 1.8, ...body, color: INK,
                resize: "vertical", outline: "none", borderRadius: 0, WebkitAppearance: "none",
              }}
            />
            {error && <p style={{ color: RED, fontSize: 13, marginTop: 8 }}>{error}</p>}
            <button
              onClick={submit}
              disabled={loading || !answer.trim()}
              style={{
                marginTop: 12, width: "100%", minHeight: 50,
                background: loading || !answer.trim() ? "#B9BFC9" : INK,
                color: "#FFF", border: "none", padding: "14px",
                fontSize: 15, fontWeight: 600, cursor: loading ? "wait" : "pointer",
                letterSpacing: 4, ...body,
              }}
            >
              {loading ? "批改中…" : "提交批改"}
            </button>
            {loading && <p style={{ fontSize: 12.5, color: FAINT, textAlign: "center", marginTop: 10 }}>通常只需几秒</p>}
            {!loading && attempts.length > 0 && (
              <div style={{ marginTop: 14 }}>
                <p style={{ ...mono, fontSize: 11, color: FAINT, margin: "0 0 6px", letterSpacing: 0.5 }}>
                  历史作答({attempts.length})
                </p>
                <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                  {[...attempts].reverse().map((a, i) => (
                    <button
                      key={a.ts || i}
                      onClick={() => { setAnswer(a.answer || ""); setResult(a.result); }}
                      style={{
                        display: "flex", alignItems: "center", gap: 10,
                        width: "100%", textAlign: "left", minHeight: 44,
                        background: "none", border: `1px dashed ${RULE}`,
                        padding: "9px 12px", cursor: "pointer", ...body,
                      }}
                    >
                      <span style={{ ...hand, fontSize: 19, color: RED, width: 34, flexShrink: 0, transform: "rotate(-3deg)" }}>
                        {a.result?.score}
                      </span>
                      <span style={{ flex: 1, fontSize: 12.5, color: SUBINK, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                        {(a.answer || "").slice(0, 40)}
                      </span>
                      <span style={{ ...mono, fontSize: 10.5, color: FAINT, flexShrink: 0 }}>
                        {a.ts ? new Date(a.ts).toLocaleDateString() : ""}
                      </span>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>
        )}

        {result && (
          <div style={{ marginTop: 16 }} className="rise">
            <ResultView result={result} />
            <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
              <button
                onClick={() => { setResult(null); setError(null); }}
                style={{ flex: 1, minHeight: 48, background: CARD, border: `1.5px solid ${INK}`, color: INK, padding: "12px", fontSize: 14, fontWeight: 600, cursor: "pointer", ...body }}
              >
                再答一次
              </button>
              <button
                onClick={() => setView("list")}
                style={{ flex: 1, minHeight: 48, background: INK, border: "none", color: "#FFF", padding: "12px", fontSize: 14, fontWeight: 600, cursor: "pointer", ...body }}
              >
                下一题 →
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

</script>
</body>
</html>
